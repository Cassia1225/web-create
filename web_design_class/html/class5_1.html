<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>第5回課題</title>
</head>

<body>
  <p>配列変数 n の合計とグラフ表示</p>

  <script>
    n = new Array();

    n[0] = 12;
    n[1] = 34;
    n[2] = 56;
    n[3] = 78;
    n[4] = 90;

    goukei = 0;

    for (i = 0; i < 5; i++) {
      goukei = goukei + n[i];
    }

    alert("合計は" + goukei + "です");

    document.write("<p>配列 n のグラフ</p>");

    for (i = 0; i < 5; i++) {
      document.write(
        '<img src="./../image/pixel.gif" width="20" height="' + n[i] + '" style="vertical-align:bottom; margin-right:10px;">'
      );
    }
  </script>
</body>
</html>
