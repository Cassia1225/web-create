<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>グラフ</title>
</head>
<body>
    <h1>複利計算グラフ</h1>
    <script lang="Javascript">
        gankin = 1000;
        riritu = 0.07;
        nensu = 20;

        for(i=1; i<= nensu; i++) {
            kane = gankin * Math.pow((1+riritu),i);
            barH = kane/10;
            document.write('<img src=./../image/pixel.gif width="8" height="`+barH+`">');
        }
    </script>
</body>
</html>
